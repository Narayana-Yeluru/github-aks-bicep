```yaml
name: AKS Deployment (Bicep)

on:
  workflow_dispatch:   # ONLY manual trigger (no push, no PR)

env:
  RESOURCE_GROUP: rg-aks-dev
  LOCATION: centralus

jobs:

# =========================
# 1. VALIDATE
# =========================
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Bicep
      run: |
        az bicep build --file infra/main.bicep


# =========================
# 2. WHAT-IF
# =========================
  whatif:
    name: What-If Preview
    runs-on: ubuntu-latest
    needs: validate

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Ensure Resource Group exists
      run: |
        az group create \
          --name $RESOURCE_GROUP \
          --location $LOCATION

    - name: What-If Deployment
      run: |
        az deployment group what-if \
          --resource-group $RESOURCE_GROUP \
          --template-file infra/main.bicep \
          --parameters infra/params/dev.bicepparam


# =========================
# 3. DEPLOY
# =========================
  deploy:
    name: Deploy AKS
    runs-on: ubuntu-latest
    needs: whatif

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy AKS
      run: |
        az deployment group create \
          --resource-group $RESOURCE_GROUP \
          --template-file infra/main.bicep \
          --parameters infra/params/dev.bicepparam 
```
